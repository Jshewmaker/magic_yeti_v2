name: app_ui
description: UI components for Valkyrie mobile app
version: 0.1.0+1
publish_to: none

environment:
  sdk: ">=3.1.0 <4.0.0"


dependencies:
  dotted_decoration: ^2.0.0
  flag: ^7.0.0
  flutter:
    sdk: flutter
  linked_scroll_controller: ^0.2.0
  shimmer: ^3.0.0
  top_snackbar_flutter: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^0.3.0
  very_good_analysis: ^10.1.0

flutter:
  uses-material-design: true
  fonts:
    # Static instances cut from the Nunito Sans variable font — see
    # assets/fonts/README.md for how they are generated and why.
    #
    # Short version: Flutter does NOT drive a variable font's `wght` axis from
    # TextStyle.fontWeight (verified on 3.38.4 — w200/w400/w700/w900 all render
    # identically), only from fontVariations. Shipping the variable font would
    # have silently rendered the whole app at the axis default of 200
    # (ExtraLight) and made all 38 fontWeight call sites dead code. These
    # instances keep fontWeight working the way every Flutter dev expects.
    #
    # Weights mirror the Teko set they replace, so resolution is unchanged:
    # w800/w900 still fall back to 700 exactly as they did before.
    - family: NunitoSans
      fonts:
        - asset: assets/fonts/NunitoSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/NunitoSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NunitoSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/NunitoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/NunitoSans-Light.ttf
          weight: 300
        - asset: assets/fonts/NunitoSans-Italic.ttf
          weight: 400
          style: italic
       
