name: magic_yeti
description: Magic The Gathering Tracking App
version: 1.3.0+0
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  analytics_repository:
    path: packages/analytics_repository/analytics_repository
  api_client:
    path: packages/api_client
  app_config_repository:
    path: packages/app_config_repository/app_config_repository
  app_ui:
    path: packages/app_ui
  authentication_client:
    path: packages/authentication_client/authentication_client
  auto_size_text: ^3.0.0
  bloc: ^9.2.0
  bloc_concurrency: ^0.3.0
  cached_network_image: ^3.3.1
  cloud_firestore: ^5.5.0
  equatable: ^2.0.5
  fake_app_config_repository:
    path: packages/app_config_repository/fake_app_config_repository
  firebase_analytics: ^11.4.1
  firebase_authentication_client:
    path: packages/authentication_client/firebase_authentication_client
  firebase_core: ^3.8.1
  firebase_database: ^11.2.0
  firebase_database_repository:
    path: packages/firebase_database_repository
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_launcher_icons: ^0.14.2
  flutter_localizations:
    sdk: flutter
  font_awesome_flutter: ^10.8.0
  form_inputs:
    path: packages/form_inputs
  go_router: ^14.0.2
  hold_to_confirm_button: ^0.0.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  player_repository:
    path: packages/player_repository
  provider: ^6.1.1
  scryfall_bulk_client:
    path: packages/scryfall_bulk_client
  scryfall_repository:
    path: packages/scryfall_repository
  url_launcher: ^6.3.1
  user_repository:
    path: packages/user_repository
  uuid: ^4.5.1
  wakelock_plus: ^1.2.10

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.11.1
  change_app_package_name: ^1.4.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.8.0
  mocktail: ^1.0.0
  very_good_analysis: ^10.1.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/icon.png
    - assets/icon/yeti_icon.png